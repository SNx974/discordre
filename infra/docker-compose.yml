services:
  postgres:
    image: postgres:16-alpine
    container_name: matchmaking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchmaking
      POSTGRES_PASSWORD: matchmaking
      POSTGRES_DB: matchmaking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchmaking -d matchmaking"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matchmaking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: matchmaking-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # One-shot init du bucket MinIO (idempotent)
  minio-init:
    image: minio/mc:latest
    container_name: matchmaking-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/matchmaking-screenshots &&
      mc anonymous set download local/matchmaking-screenshots &&
      echo 'MinIO bucket ready.'
      "

volumes:
  postgres_data:
  redis_data:
  minio_data: