# ===================================================================
#  MATCHMAKING — Production stack (Dockploy / Docker Compose v2)
# ===================================================================
#  Tous les services sont sur un réseau privé `matchmaking-net`.
#  Les secrets viennent des variables d'environnement (à configurer
#  dans l'UI Dockploy ou via un fichier .env séparé).
# ===================================================================

services:
  # ─── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matchmaking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchmaking}
      POSTGRES_DB: ${POSTGRES_DB:-matchmaking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matchmaking}"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [matchmaking-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 10
    networks: [matchmaking-net]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [matchmaking-net]

  # ─── Apps ────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-matchmaking}:${POSTGRES_PASSWORD:-matchmaking}@postgres:5432/${POSTGRES_DB:-matchmaking}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-matchmaking-screenshots}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://minio:9000/matchmaking-screenshots}
      OCR_PROVIDER: ${OCR_PROVIDER:-gpt4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLOUD_VISION_KEY: ${GOOGLE_CLOUD_VISION_KEY:-}
    ports:
      - "${API_PORT:-4000}:4000"
    networks: [matchmaking-net]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks: [matchmaking-net]

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ADMIN_ROLE_ID: ${DISCORD_ADMIN_ROLE_ID:-}
      DISCORD_MATCH_CATEGORY_ID: ${DISCORD_MATCH_CATEGORY_ID:-}
      API_URL: http://api:4000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      REDIS_URL: redis://redis:6379
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-info}
    networks: [matchmaking-net]

networks:
  matchmaking-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data: