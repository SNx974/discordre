# ===================================================================
#  MATCHMAKING — Production stack (Dockploy)
#  Postgres + Redis sont des services Dockploy externes (cf. .env)
#  Ce compose ne gère QUE : MinIO + API + Web + Bot
# ===================================================================

services:
  # ─── Storage (local) ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [matchmaking-net]

  # ─── API ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      API_PORT: 4000
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-matchmaking-screenshots}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/matchmaking-screenshots}
      OCR_PROVIDER: ${OCR_PROVIDER:-gpt4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLOUD_VISION_KEY: ${GOOGLE_CLOUD_VISION_KEY:-}
    ports:
      - "${API_PORT:-4000}:4000"
    networks: [matchmaking-net]

  # ─── Web ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://discordre.152-228-128-146.sslip.io}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks: [matchmaking-net]

  # ─── Bot ──────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      NODE_ENV: production
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ADMIN_ROLE_ID: ${DISCORD_ADMIN_ROLE_ID:-}
      DISCORD_MATCH_CATEGORY_ID: ${DISCORD_MATCH_CATEGORY_ID:-}
      API_URL: http://api:4000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      REDIS_URL: ${REDIS_URL}
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-info}
    networks: [matchmaking-net]

networks:
  matchmaking-net:
    driver: bridge

volumes:
  minio_data: